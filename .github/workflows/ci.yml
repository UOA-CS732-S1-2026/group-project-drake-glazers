name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm install --prefix client
      - run: npm install --prefix server
      - run: cd client && npm run lint
      - run: cd server && npm run lint
      - run: cd server && npm run check-env

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run install:all
      - run: cd server && npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5433/postgres
          DIRECT_URL: postgresql://postgres:test@localhost:5433/postgres
      - run: npm test

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --prefix server
      - run: cd server && npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres
          DIRECT_URL: postgresql://postgres:test@localhost:5432/postgres
      - run: cd server && npm run build

  prisma:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --prefix server
      - run: cd server && npx prisma validate
      - run: cd server && npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema ./prisma/schema.prisma --exit-code
